<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbolic Algebra Calculator</title>

    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <!-- KaTeX JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- Nerdamer Core and Add-ons -->
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-color: #333;
            --border-color: #dee2e6;
            --primary-color: #4a90e2;
            --secondary-color: #f1f3f5;
            --button-hover: #357abd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: monospace;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            background-color: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        .secondary-input {
            width: 80px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-left: 5px;
            text-align: center;
        }

        .history-container {
            margin-top: 30px;
            border-top: 2px solid var(--border-color);
            padding-top: 20px;
        }

        .history-item {
            background-color: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .history-item .operation {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
            font-style: italic;
        }

        .history-item .input-display {
            font-size: 1.1em;
            margin-bottom: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .history-item .result-display {
            font-size: 1.3em;
            color: var(--primary-color);
            background-color: rgba(74, 144, 226, 0.05);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            border-left: 4px solid var(--primary-color);
        }

        .error {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #d32f2f;
            margin-top: 10px;
            font-family: monospace;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-group {
            display: flex;
            align-items: center;
            background-color: white;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .action-group button {
            margin-right: 5px;
        }

        .clear-btn {
            background-color: #dc3545;
            margin-left: auto;
        }

        .clear-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Symbolic Algebra Calculator</h1>

    <div class="input-group">
        <label for="expressionInput">Enter Expression or Equation:</label>
        <input type="text" id="expressionInput" placeholder="e.g., x^2 + 2*x + 1 or sin(x) + cos(x) = 1 or integrate(x^2, x)" autocomplete="off">
        <div style="font-size: 0.85em; color: #666; margin-top: 5px;">
            Examples: <code>solve(x^2+x-6=0, x)</code>, <code>expand((x+1)^3)</code>, <code>factor(x^2-1)</code>, <code>diff(sin(x), x)</code>
        </div>
    </div>

    <div class="actions">
        <button onclick="processMath('evaluate')">Evaluate / Simplify</button>
        <button onclick="processMath('expand')">Expand</button>
        <button onclick="processMath('factor')">Factor</button>

        <div class="action-group">
            <button onclick="processMath('solve')">Solve for / Roots of</button>
            <input type="text" id="solveVar" class="secondary-input" value="x" placeholder="var">
        </div>

        <div class="action-group">
            <button onclick="processMath('diff')">Differentiate w.r.t</button>
            <input type="text" id="diffVar" class="secondary-input" value="x" placeholder="var">
        </div>

        <div class="action-group">
            <button onclick="processMath('integrate')">Integrate w.r.t</button>
            <input type="text" id="intVar" class="secondary-input" value="x" placeholder="var">
        </div>

        <div class="action-group">
            <button onclick="processMath('sub')">Substitute</button>
            <input type="text" id="subVar" class="secondary-input" value="x" placeholder="var">
            <span style="margin: 0 5px;">=</span>
            <input type="text" id="subVal" class="secondary-input" value="1" placeholder="val">
        </div>

        <div class="action-group" style="flex-basis: 100%; margin-top: 10px;">
            <button onclick="processMath('sys')">Solve System</button>
            <input type="text" id="sysEq1" class="secondary-input" style="flex:1" placeholder="Eq 1, e.g., x+y=5">
            <input type="text" id="sysEq2" class="secondary-input" style="flex:1" placeholder="Eq 2, e.g., x-y=1">
        </div>

        <button class="clear-btn" style="margin-top: 10px;" onclick="clearHistory()">Clear History</button>
    </div>

    <div id="currentError" class="error" style="display: none;"></div>

    <div class="history-container" id="historyContainer">
        <!-- Results will appear here -->
    </div>
</div>

<script>
    // Initialize KaTeX auto-render options
    document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
            delimiters: [
                {left: "$$", right: "$$", display: true},
                {left: "$", right: "$", display: false}
            ]
        });

        // Add enter key support
        document.getElementById("expressionInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                processMath("evaluate");
            }
        });
    });

    function displayError(msg) {
        const errDiv = document.getElementById("currentError");
        errDiv.textContent = msg;
        errDiv.style.display = "block";
        setTimeout(() => {
            errDiv.style.display = "none";
        }, 5000);
    }

    function addToHistory(operationStr, inputLatex, resultLatex) {
        const container = document.getElementById("historyContainer");

        const itemDiv = document.createElement("div");
        itemDiv.className = "history-item";

        const opDiv = document.createElement("div");
        opDiv.className = "operation";
        opDiv.textContent = operationStr;

        const inputDiv = document.createElement("div");
        inputDiv.className = "input-display";
        inputDiv.textContent = `$$ ${inputLatex} $$`;

        const resultDiv = document.createElement("div");
        resultDiv.className = "result-display";
        resultDiv.textContent = `$$ ${resultLatex} $$`;

        itemDiv.appendChild(opDiv);
        itemDiv.appendChild(inputDiv);
        itemDiv.appendChild(resultDiv);

        // Insert at the top
        container.insertBefore(itemDiv, container.firstChild);

        // Render KaTeX for the new item
        renderMathInElement(itemDiv, {
            delimiters: [
                {left: "$$", right: "$$", display: true}
            ]
        });
    }

    function clearHistory() {
        document.getElementById("historyContainer").innerHTML = "";
        document.getElementById("expressionInput").value = "";
        document.getElementById("expressionInput").focus();
    }

    function processMath(action) {
        const input = document.getElementById("expressionInput").value.trim();
        if (!input) {
            displayError("Please enter an expression.");
            return;
        }

        let operationStr = "";
        let resultStr = "";
        let resultLatex = "";
        let inputLatex = "";

        try {
            // Special handling for systems of equations
            if (action === 'sys') {
                const eq1 = document.getElementById("sysEq1").value.trim();
                const eq2 = document.getElementById("sysEq2").value.trim();
                if (!eq1 || !eq2) {
                    displayError("Please enter both equations for the system.");
                    return;
                }
                operationStr = `Solve System`;
                inputLatex = `\\begin{cases} ${nerdamer(eq1).toTeX()} \\\\ ${nerdamer(eq2).toTeX()} \\end{cases}`;

                // nerdamer.solveEquations accepts an array of strings
                const sol = nerdamer.solveEquations([eq1, eq2]);
                // format output: [[x, val1], [y, val2]]
                resultLatex = sol.map(s => `${s[0]} = ${nerdamer(s[1]).toTeX()}`).join(", \\quad ");
                addToHistory(operationStr, inputLatex, resultLatex);
                return;
            }

            // Get original LaTeX representation
            try {
                inputLatex = nerdamer(input).toTeX();
            } catch(e) {
                // If nerdamer fails to parse it raw, just use the string as fallback
                inputLatex = input;
            }

            switch(action) {
                case 'evaluate':
                    operationStr = "Evaluate / Simplify";
                    // nerdamer automatically simplifies
                    resultStr = nerdamer(input).evaluate().toString();
                    resultLatex = nerdamer(input).evaluate().toTeX();
                    break;

                case 'expand':
                    operationStr = "Expand";
                    resultStr = nerdamer('expand(' + input + ')').toString();
                    resultLatex = nerdamer('expand(' + input + ')').toTeX();
                    break;

                case 'factor':
                    operationStr = "Factor";
                    resultStr = nerdamer('factor(' + input + ')').toString();
                    resultLatex = nerdamer('factor(' + input + ')').toTeX();
                    break;

                case 'solve':
                    const sVar = document.getElementById("solveVar").value.trim() || 'x';
                    operationStr = `Solve for ${sVar}`;
                    // Handle equation vs expression
                    let eq = input;
                    if (!eq.includes('=')) {
                        eq = eq + '=0'; // default to finding roots
                    }
                    const solutions = nerdamer.solve(eq, sVar);
                    resultLatex = sVar + " \\in \\{" + solutions.toTeX() + "\\}";
                    break;

                case 'diff':
                    const dVar = document.getElementById("diffVar").value.trim() || 'x';
                    operationStr = `Differentiate w.r.t ${dVar}`;
                    inputLatex = "\\frac{d}{d" + dVar + "} \\left(" + inputLatex + "\\right)";
                    resultLatex = nerdamer(`diff(${input}, ${dVar})`).toTeX();
                    break;

                case 'integrate':
                    const iVar = document.getElementById("intVar").value.trim() || 'x';
                    operationStr = `Integrate w.r.t ${iVar}`;
                    inputLatex = "\\int \\left(" + inputLatex + "\\right) d" + iVar;
                    resultLatex = nerdamer(`integrate(${input}, ${iVar})`).toTeX();
                    break;

                case 'sub':
                    const sVarToRep = document.getElementById("subVar").value.trim() || 'x';
                    const sVal = document.getElementById("subVal").value.trim() || '1';
                    operationStr = `Substitute ${sVarToRep} = ${sVal}`;
                    const evaluated = nerdamer(input).substitute(sVarToRep, sVal);
                    // Simplify it right away after sub
                    resultLatex = nerdamer(evaluated).toTeX();
                    break;
            }

            // Clean up LaTeX output from nerdamer slightly if needed
            if (resultLatex === undefined || resultLatex === null) {
                throw new Error("Could not compute result");
            }

            addToHistory(operationStr, inputLatex, resultLatex);

            // Clear input for next calculation
            // document.getElementById("expressionInput").value = "";

        } catch (error) {
            console.error(error);
            displayError("Error: " + error.toString().replace("Error:", "").trim());
        }
    }
</script>

</body>
</html>
