<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris Twists</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <div id="ui-left" class="panel">
            <h2>STATISTICS</h2>
            <div class="stat-box">SCORE <span id="score-display">0</span></div>
            <div class="stat-box">LEVEL <span id="level-display">1</span></div>
            <div class="stat-box">LINES <span id="lines-display">0</span></div>

            <div class="controls-hint">
                <p>&larr; &rarr; Move</p>
                <p>&uarr; Rotate</p>
                <p>&darr; Soft Drop</p>
                <p>Space Hard Drop</p>
                <p>P Pause / Resume</p>
            </div>
        </div>

        <div id="board-container">
            <canvas id="game-canvas" width="300" height="600"></canvas>
            <div id="game-over-screen" class="overlay hidden">
                <h2>GAME OVER</h2>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn">PLAY AGAIN</button>
            </div>
            <div id="pause-screen" class="overlay hidden">
                <h2>PAUSED</h2>
                <button id="resume-btn">RESUME</button>
            </div>
        </div>

        <div id="ui-right" class="panel">
            <h2>NEXT</h2>
            <canvas id="next-piece-canvas" width="120" height="120"></canvas>

            <div class="mechanics-hint mt-20">
                <h3 class="neon-text-small">TWISTS ACTIVE:</h3>
                <p><span class="highlight">TRUE GRAVITY:</span> Cleared lines cause blocks above to fall down
                    independently.</p>
                <p><span class="highlight-bomb">BOMB BLOCK:</span> Explodes and clears surrounding blocks on touch.</p>
            </div>
        </div>
    </div>

    <!-- Load scripts sequentially -->
    <script src="constants.js"></script>
    <script src="utils.js"></script>
    <script src="tetromino.js"></script>
    <script src="board.js"></script>
    <script src="renderer.js"></script>
    <script src="game.js"></script>
    <script src="main.js"></script>
</body>

</html>
