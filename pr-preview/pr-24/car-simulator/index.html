<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Driving Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #87CEEB;
        }
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-size: 14px;
        font-family: 'Courier New', monospace;
        border: 2px solid #333;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
        min-width: 200px;
    }
    #controls {
        margin-bottom: 15px;
        border-bottom: 1px solid #555;
        padding-bottom: 10px;
    }
    #speed {
        font-weight: bold;
        color: #00ff00;
        font-size: 16px;
        text-shadow: 0 0 5px #00ff00;
    }
    #rpm {
        margin-top: 5px;
        color: #ff6600;
        font-size: 14px;
    }
    #gear {
        margin-top: 5px;
        color: #ffff00;
    }
    #fuel {
        margin-top: 5px;
        color: #00ccff;
    }
    #health {
        margin-top: 5px;
        color: #ff3333;
    }
    #score {
        margin-top: 10px;
        color: #ffffff;
        font-weight: bold;
        border-top: 1px solid #555;
        padding-top: 10px;
    }
    #minimap {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 200px;
        height: 200px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 10px;
        border: 2px solid #333;
        overflow: hidden;
    }
    #minimap-canvas {
        width: 100%;
        height: 100%;
        display: block;
    }

    /* Touch Controls */
    #touch-controls {
        display: none;
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        height: 150px;
        pointer-events: none;
        z-index: 100;
    }
    #joystick-zone {
        position: absolute;
        bottom: 30px;
        left: 30px;
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        pointer-events: auto;
        touch-action: none;
        z-index: 200;
    }
    @media (max-width: 900px) {
        #joystick-zone {
            left: 50px;
            bottom: 50px;
        }
        .action-buttons {
            right: 50px;
            bottom: 50px;
        }
    }
    #joystick-knob {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 50px;
        height: 50px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    .action-buttons {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        gap: 15px;
        pointer-events: auto;
        align-items: flex-end;
        z-index: 200;
    }
    .touch-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 10px;
        color: white;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        touch-action: manipulation;
        cursor: pointer;
    }
    .touch-btn:active {
        background: rgba(255, 255, 255, 0.5);
        transform: scale(0.95);
    }
    .dpad-up { grid-column: 2; grid-row: 1; }
    .dpad-down { grid-column: 2; grid-row: 3; }
    .dpad-left { grid-column: 1; grid-row: 2; }
    .dpad-right { grid-column: 3; grid-row: 2; }

    .action-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        font-size: 16px;
    }
    #btn-toggle-touch {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 40px;
        height: 40px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid white;
        border-radius: 5px;
        color: white;
        font-size: 20px;
        z-index: 200;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    @media (max-width: 900px) {
        #minimap {
            display: none;
        }
        #ui {
            max-width: 250px;
        }
        #controls {
            display: none;
        }
    }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <div id="controls">
            <strong>Controls:</strong><br>
            W - Accelerate<br>
            S - Brake<br>
            A/D - Steer Left/Right<br>
            Space - Handbrake<br>
            R - Reset Car<br>
            P - Pause<br>
            F - Debug Info
        </div>
        <div id="speed">Speed: 0 km/h</div>
        <div id="rpm">RPM: 800</div>
        <div id="gear">Gear: N</div>
        <div id="fuel">Fuel: 100%</div>
        <div id="health">Health: 100%</div>
        <div id="score">Score: 0</div>
    </div>
    <div id="minimap">
        <canvas id="minimap-canvas"></canvas>
    </div>


    <div id="touch-controls">
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        <div class="action-buttons">
            <div class="touch-btn action-btn" id="btn-reset">R</div>
            <div class="touch-btn action-btn" id="btn-brake" style="width: 80px; border-radius: 30px;">SPACE</div>
        </div>
    </div>
    <button id="btn-toggle-touch">📱</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
