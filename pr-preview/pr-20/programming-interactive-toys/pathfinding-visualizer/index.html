<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pathfinding Visualizer</h1>
            <div class="controls">
                <div class="control-group">
                    <label for="algorithm-select">Algorithm</label>
                    <select id="algorithm-select">
                        <option value="dijkstra">Dijkstra's</option>
                        <option value="astar">A* Search</option>
                        <option value="bfs">Breadth-First Search</option>
                        <option value="dfs">Depth-First Search</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="speed-slider">Speed</label>
                    <input type="range" id="speed-slider" min="1" max="100" value="50">
                </div>

                <div class="button-group">
                    <button id="clear-board-btn" class="secondary">Clear Board</button>
                    <button id="clear-path-btn" class="secondary">Clear Path</button>
                    <button id="visualize-btn" class="primary">Visualize!</button>
                </div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="node start-node"></div> Start Node</div>
                <div class="legend-item"><div class="node end-node"></div> Target Node</div>
                <div class="legend-item"><div class="node wall-node"></div> Wall Node</div>
                <div class="legend-item"><div class="node unvisited-node"></div> Unvisited Node</div>
                <div class="legend-item"><div class="node visited-node"></div> Visited Node</div>
                <div class="legend-item"><div class="node path-node"></div> Shortest-path Node</div>
            </div>
            <div id="stats">
                <span>Visited Nodes: <b id="visited-count">0</b></span>
                <span>Path Length: <b id="path-length">0</b></span>
            </div>
        </header>

        <main>
            <div id="grid-container"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
