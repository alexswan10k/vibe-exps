<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMX Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="hud">
            <div id="lap-display">Lap: 1/3</div>
            <div id="pos-display">Pos: 1/4</div>
            <div id="time-display">Time: 0.00</div>
            <div id="track-name">Track Name</div>
        </div>
        <div id="crash-overlay" style="display: none;">CRASHED!</div>
        <div id="message-overlay" style="display: none;">RACE OVER</div>


        <div id="main-menu">
            <h1>URBAN BMX SIM</h1>
            <p>Select a track to race:</p>
            <div id="track-list"></div>
        </div>

    </div>
    <div id="touch-controls">
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        <div class="action-buttons">
            <!-- Additional buttons could go here if needed -->
        </div>
    </div>
    <button id="btn-toggle-touch">📱</button>


    <script src="MathUtils.js"></script>
    <script src="Input.js"></script>
    <script src="Tracks.js"></script>
    <script src="Bike.js"></script>
    <script src="AIController.js"></script>
    <script src="Game.js"></script>
</body>

</html>
