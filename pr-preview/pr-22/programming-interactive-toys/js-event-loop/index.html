<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Event Loop Visualizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #61dafb;
            text-align: center;
            margin-bottom: 30px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #61dafb;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .box {
            background: #2d2d2d;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            flex: 1 1 300px;
            display: flex;
            flex-direction: column;
        }

        .box h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #ffb86c;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .stack-item {
            background: #61dafb;
            color: #000;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            animation: popIn 0.3s ease-out forwards;
        }

        .queue-item {
            background: #50fa7b;
            color: #000;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            animation: slideIn 0.3s ease-out forwards;
        }

        .micro-item {
            background: #ff79c6;
            color: #000;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            animation: slideIn 0.3s ease-out forwards;
        }

        .api-item {
            background: #bd93f9;
            color: #000;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            position: relative;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #444;
            width: 100%;
            max-width: 800px;
        }

        button {
            background: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: #555;
            border-color: #888;
        }

        button:active {
            transform: scale(0.98);
        }

        .run-btn {
            background: #50fa7b;
            color: #000;
            border-color: #50fa7b;
        }

        .run-btn:hover {
            background: #69ff94;
        }

        .code-editor {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            background: #1e1e1e;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: #f8f8f2;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            border: none;
            padding: 10px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }

        .console {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            background: #000;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            min-height: 100px;
            font-family: monospace;
            color: #f8f8f2;
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .items-container {
            display: flex;
            flex-direction: column-reverse; /* Stack from bottom */
            flex-grow: 1;
            justify-content: flex-end;
            gap: 5px;
        }

        /* Queue containers need normal flow */
        #macro-queue .items-container, #micro-queue .items-container {
            flex-direction: column;
            justify-content: flex-start;
        }

    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back</a>
    <h1>🔄 JS Event Loop Visualizer</h1>

    <div class="container">
        <div class="box" id="call-stack">
            <h2>Call Stack</h2>
            <div class="items-container"></div>
        </div>

        <div class="box" id="web-apis">
            <h2>Web APIs</h2>
            <div class="items-container"></div>
        </div>

        <div class="box" id="macro-queue">
            <h2>Macro Task Queue (Callback Queue)</h2>
            <div class="items-container"></div>
        </div>

        <div class="box" id="micro-queue">
            <h2>Micro Task Queue</h2>
            <div class="items-container"></div>
        </div>
    </div>

    <div class="console" id="console-output">
        <div style="color: #888; font-style: italic; margin-bottom: 10px;">// Console Output</div>
    </div>

    <div class="code-editor">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0; color: #ffb86c;">Code Snippet</h3>
            <select id="snippet-select" style="background: #444; color: white; border: none; padding: 5px; border-radius: 4px;">
                <option value="basic">Basic Log</option>
                <option value="timeout">SetTimeout</option>
                <option value="promise">Promise</option>
                <option value="complex">Complex Example</option>
            </select>
        </div>
        <textarea id="code-input" readonly>
console.log('Start');
setTimeout(() => console.log('Timeout'), 0);
Promise.resolve().then(() => console.log('Promise'));
console.log('End');</textarea>
    </div>

    <div class="controls">
        <button id="step-btn">Step Next</button>
        <button id="play-btn" class="run-btn">Play All</button>
        <button id="reset-btn">Reset</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
