<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F-Zero Clone</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            z-index: 10;
        }
        #speedometer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        #lap-counter {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 14px;
            color: #aaa;
            pointer-events: none;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 10px;
            color: #fff;
            text-decoration: none;
            background: #333;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #555;
            pointer-events: auto;
        }
        .back-link:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <div id="ui">
        <a href="../index.html" class="back-link">&larr; Back to Projects</a>
        <div id="lap-counter">LAP 1/3</div>
    </div>
    <div id="speedometer">0 km/h</div>
    <div id="controls-help">Controls: Arrows (Drive) • Q/E (Drift/Slide)</div>

    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
